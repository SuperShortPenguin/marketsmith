<h1>Waiting for players...</h1>

<p><strong>Your seat:</strong> {{ player.seat_number }}</p>

<p>
    Players joined:
    <span id="player-count">{{ player_count }}</span>
    / {{ max_players }}
</p>

<script>
    const gameId = "{{ game.id }}";
    const maxPlayers = {{ max_players }};

    const socket = new WebSocket(
        "ws://" + window.location.host + "/ws/waiting/" + gameId + "/"
    );

    socket.onmessage = function (event) {
        const data = JSON.parse(event.data);

    if (data.type === "player_joined") {
        document.getElementById("player-count").innerText = data.player_count;
    }

    if (data.type === "game_started") {
        window.location.href = "/game/{{ game.id }}/";
    }
};


</script>
