<h1>Waiting for players...</h1>

<p><strong>Your seat:</strong> {{ player.seat_number }}</p>

<p id="count">
    Players joined: {{ player_count }} / {{ max_players }}
</p>

<script>
    const gameId = "{{ game.id }}";
    const maxPlayers = {{ max_players }};

    const socket = new WebSocket(
        "ws://" + window.location.host + "/ws/waiting/" + gameId + "/"
    );

    socket.onmessage = function (event) {
        const data = JSON.parse(event.data);

        if (data.type === "player_joined") {
            document.getElementById("count").innerText =
                `Players joined: ${data.player_count} / ${maxPlayers}`;

            if (data.player_count === maxPlayers) {
                window.location.href = `/game/${gameId}/`;
            }
        }
    };
</script>
