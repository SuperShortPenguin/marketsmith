<!DOCTYPE html>
<html>
<head>
    <title>Lobby</title>
</head>
<body>

    <h1>Welcome to MarketSmith</h1>

    {% if user.is_authenticated %}

        <p>Hello, {{ user.username }}</p>

        <form action="{% url 'matchmaking' %}" method="POST">
            {% csrf_token %}
            <button type="submit">Play</button>
        </form>

        <a href="{% url 'logout' %}">
            <button type="button">Logout</button>
        </a>

    {% else %}

        <a href="{% url 'login' %}">
            <button type="button">Login</button>
        </a>

        <a href="{% url 'register' %}">
            <button type="button">Register</button>
        </a>

    {% endif %}

</body>
</html>
