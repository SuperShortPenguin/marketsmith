{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Market</title>
    <link rel="stylesheet" href="{% static 'login.css' %}">
</head>
<body>

    <h2>Login</h2>

    {% if form.errors %}
        <p style="color: red;">
            Invalid username or password.
        </p>
    {% endif %}

    <form method="POST">
    {% csrf_token %}
    {{ form.non_field_errors }}
    {{ form.as_p }}
    <button type="submit" class="login-submit">Login</button>
</form>

</body>
</html>
